# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 60  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    arm_position_controller:
      type: position_controllers/JointGroupPositionController

    arm_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


    hand_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - base_rotation
      - shoulder_joint
      - elbow_joint
      - wrist_pitch
      - wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

arm_position_controller:
  ros__parameters:
    joints:
      - base_rotation
      - shoulder_joint
      - elbow_joint
      - wrist_pitch
      - wrist_roll

arm_velocity_controller:
  ros__parameters:
    joints:
      - base_rotation
      - shoulder_joint
      - elbow_joint
      - wrist_pitch
      - wrist_roll

hand_controller:
  ros__parameters:
    joint: gripper
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
    goal_tolerance: 0.01