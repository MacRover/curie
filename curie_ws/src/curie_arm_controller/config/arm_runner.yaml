        flash:
          position_factor: 1.0
          velocity_factor: 1.0
          abs_position_factor: 360.0
          abs_velocity_factor: 360.0
          control_type: 3
          sensor_type: 4
      - name: arm_elbow
        device_id: 17
        max_velocity: 10.0
        max_acceleration: 30.0
        status_rates: [0, 0, 0, 0, 0, 50, 0, 0, 20]
        listen_for_heartbeat: true
        heartbeat_timeout: 2.0
