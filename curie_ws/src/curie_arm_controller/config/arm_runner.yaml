mock_runners:
  - name: arm_runner
    can_interface: vcan0
    can_bitrate: 1000000
    filters:
      - can_id: 0x02050000
        can_mask: 0x0FFFFC00
      - can_id: 0x0205C000
        can_mask: 0x0FFFC000
      - can_id: 0x02053800
        can_mask: 0x0FFFFFC0
      - can_id: 0x01011840
        can_mask: 0x0FFFFFFF
    can_nodes:
      - name: arm_base
        device_id: 18
        max_velocity: 10.0
        max_acceleration: 30.0
        status_rates: [0, 0, 0, 0, 0, 50, 0, 0, 20]
        listen_for_heartbeat: true
        heartbeat_timeout: 2.0
        flash:
          position_factor: 1.0
          velocity_factor: 1.0
          abs_position_factor: 360.0
          abs_velocity_factor: 360.0
          control_type: 3
          sensor_type: 4
      - name: arm_shoulder
        device_id: 16
        max_velocity: 10.0
        max_acceleration: 30.0
        status_rates: [0, 0, 0, 0, 0, 50, 0, 0, 20]
        listen_for_heartbeat: true
